            resource memoryPool[int64]

            # Enum Definition
            CUmemAllocationType = CU_MEM_ALLOCATION_TYPE_INVALID, CU_MEM_ALLOCATION_TYPE_PINNED, CU_MEM_ALLOCATION_TYPE_MAX
            CUmemAllocationHandleType = CU_MEM_HANDLE_TYPE_NONE, CU_MEM_HANDLE_TYPE_POSIX_FILE_DESCRIPTOR, CU_MEM_HANDLE_TYPE_WIN32, CU_MEM_HANDLE_TYPE_WIN32_KMT, CU_MEM_HANDLE_TYPE_FABRIC, CU_MEM_HANDLE_TYPE_MAX
            CUmemLocationType = CU_MEM_LOCATION_TYPE_INVALID, CU_MEM_LOCATION_TYPE_DEVICE, CU_MEM_LOCATION_TYPE_HOST, CU_MEM_LOCATION_TYPE_HOST_NUMA, CU_MEM_LOCATION_TYPE_HOST_NUMA_CURRENT, CU_MEM_LOCATION_TYPE_MAX

            # API Definition
            syz_cuDeviceSetMemPool(device_fd device_fd, memoryPool memoryPool)
            syz_cuMemPoolCreate(pool ptr[out, memoryPool], poolProps ptr[in, CUmemPoolProps])
            syz_cuDeviceGet(device ptr[out, device_fd], ordinal const[0])

            # Structure Definition
            CUmemPoolProps {
                allocType		flags[CUmemAllocationType, int32]
                handleTypes		flags[CUmemAllocationHandleType, int32]
                location		CUmemLocation
                maxSize			const[0, int64]
                reserved		const[0, int8]
                win32SecurityAttr	const[0, int64]
            }

            CUmemLocation {
                type	flags[CUmemLocationType, int32]
                id	device_fd
            }

